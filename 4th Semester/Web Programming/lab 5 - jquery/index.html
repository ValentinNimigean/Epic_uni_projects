<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stylish Modal Form</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background:url('minecraft_4289159.jpg');
      background-size: cover;
    }

    #mainForm {
      background: rgba(255, 255, 255, 0.85);
      padding: 30px;
      margin: 80px auto;
      width: 400px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
    }

    #mainForm h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }

    button:hover {
      background-color: #45a049;
    }

    #overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
    }

    #modal {
      display: none;
      position: fixed;
      width: 400px;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      z-index: 1000;
    }

    #modal h3 {
      margin-top: 0;
      text-align: center;
      font-size: 20px;
    }

    #modal input[type="text"] {
      padding: 8px;
      margin: 8px 0;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    #modalButton {
      background-color: #2196F3;
    }

    #modalBackButton{
      background-color: red;
      position: absolute;
      top: 5px;
      width: 30px;
      height: 30px;
      right: 5px;
      text-align: center;
      
    }
    #modalBackButton:hover{
      background-color: maroon;
    }



    #modalButton:hover {
      background-color: #1976D2;
    }
  </style>
</head>
<body>

  <form id="mainForm">
    <h2>Super Duper Jquery Form</h2>
    <input type="text" placeholder="Field 1" >
    <input type="text" placeholder="Field 2" >
    <input type="text" placeholder="Field 3" >
    <input type="text" placeholder="Field 4" >
    <input type="text" placeholder="Field 5" >
    <input type="text" id="resultField" placeholder="Result will appear here" readonly>
    <button type="button" id="openModal">Open Modal</button>
  </form>

  <div id="overlay"></div>

  <div id="modal">
    <h3>Modal Form</h3>
    <button id="modalBackButton">X</button>
    <input type="text" id="modal1" placeholder="Input 1">
    <input type="text" id="modal2" placeholder="Input 2">
    <input type="text" id="modal3" placeholder="Input 3">
    <input type="text" id="modal4" placeholder="Input 4">
    <button type="button" id="modalButton">Submit</button>
  </div>

  <script>
    function centerModal() {
      $('#modal').css({
        left: ($(window).width() - $('#modal').outerWidth()) / 2,
        top: ($(window).height() - $('#modal').outerHeight()) / 2
      });
    }

    $(document).ready(function () {
      $('#openModal').click(function () {
        $('#overlay').fadeIn();
        $('#modal').fadeIn();
        centerModal();
        $('#mainForm input[type="text"]').prop('disabled', true);
      });

      $('#modalBackButton').click(function () {
        
        
        $('#modal').fadeOut();
        $('#overlay').fadeOut();
        $('#mainForm input[type="text"]').prop('disabled', false);
        $('#modal input[type="text"]').val('')
        });


      $('#modalButton').click(function () {
        var values = [
          $('#modal1').val(),
          $('#modal2').val(),
          $('#modal3').val(),
          $('#modal4').val()
        ];
        var concatenated = values.join('');
        $('#resultField').val(concatenated);
        $('#modal').fadeOut();
        $('#overlay').fadeOut();
        $('#mainForm input[type="text"]').prop('disabled', false);
        $('#modal input[type="text"]').val('')
      });

      

      $(window).resize(centerModal);
    });
  </script>
</body>
</html>
